plugins:
  - serverless-esbuild
  - serverless-offline
  - serverless-dotenv-plugin

resources:
  Resources:
    EventsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.eventsTable}
        BillingMode: PAY_PER_REQUEST
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: true
        SSESpecification:
          SSEEnabled: true
        AttributeDefinitions:
          - AttributeName: eventId
            AttributeType: S
          - AttributeName: userId
            AttributeType: S
        KeySchema:
          - AttributeName: eventId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: userId-index
            KeySchema:
              - AttributeName: userId
                KeyType: HASH
            Projection:
              ProjectionType: ALL

    FacesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.facesTable}
        BillingMode: PAY_PER_REQUEST
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: true
        SSESpecification:
          SSEEnabled: true
        AttributeDefinitions:
          - AttributeName: faceId
            AttributeType: S
          - AttributeName: eventId
            AttributeType: S
        KeySchema:
          - AttributeName: faceId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: eventId-index
            KeySchema:
              - AttributeName: eventId
                KeyType: HASH
            Projection:
              ProjectionType: ALL

    PhotosTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.photosTable}
        BillingMode: PAY_PER_REQUEST
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: true
        SSESpecification:
          SSEEnabled: true
        AttributeDefinitions:
          - AttributeName: photoId
            AttributeType: S
          - AttributeName: eventId
            AttributeType: S
        KeySchema:
          - AttributeName: photoId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: eventId-index
            KeySchema:
              - AttributeName: eventId
                KeyType: HASH
            Projection:
              ProjectionType: ALL
    
    UsersTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.usersTable}
        BillingMode: PAY_PER_REQUEST
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: true
        SSESpecification:
          SSEEnabled: true
        AttributeDefinitions:
          - AttributeName: userId
            AttributeType: S
          - AttributeName: email
            AttributeType: S
          - AttributeName: resetToken
            AttributeType: S
        KeySchema:
          - AttributeName: userId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: email-index
            KeySchema:
              - AttributeName: email
                KeyType: HASH
            Projection:
              ProjectionType: ALL
          - IndexName: resetToken-index
            KeySchema:
              - AttributeName: resetToken
                KeyType: HASH
            Projection:
              ProjectionType: ALL

    OrdersTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.ordersTable}
        BillingMode: PAY_PER_REQUEST
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: true
        SSESpecification:
          SSEEnabled: true
        AttributeDefinitions:
          - AttributeName: orderId
            AttributeType: S
          - AttributeName: userId
            AttributeType: S
        KeySchema:
          - AttributeName: orderId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: userId-index
            KeySchema:
              - AttributeName: userId
                KeyType: HASH
            Projection:
              ProjectionType: ALL

    BillingRecordsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.billingRecordsTable}
        BillingMode: PAY_PER_REQUEST
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: true
        SSESpecification:
          SSEEnabled: true
        AttributeDefinitions:
          - AttributeName: stripeSessionId
            AttributeType: S
          - AttributeName: dateYearMonth
            AttributeType: S
          - AttributeName: createdAt
            AttributeType: N
        KeySchema:
          - AttributeName: stripeSessionId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: dateYearMonth-index
            KeySchema:
              - AttributeName: dateYearMonth
                KeyType: HASH
              - AttributeName: createdAt
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

    RawPhotosBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:custom.rawPhotosBucket}
        LifecycleConfiguration:
          Rules:
            - Id: DeleteOldPhotos
              Status: Enabled
              ExpirationInDays: 180
        PublicAccessBlockConfiguration:
          BlockPublicAcls: true
          BlockPublicPolicy: true
          IgnorePublicAcls: true
          RestrictPublicBuckets: true

    FaceIndexBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:custom.faceIndexBucket}
        LifecycleConfiguration:
          Rules:
            - Id: DeleteOldFaces
              Status: Enabled
              ExpirationInDays: 180
        PublicAccessBlockConfiguration:
          BlockPublicAcls: true
          BlockPublicPolicy: true
          IgnorePublicAcls: true
          RestrictPublicBuckets: true

    GatewayResponseDefault4XX:
      Type: 'AWS::ApiGateway::GatewayResponse'
      Properties:
        ResponseParameters:
          gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
          gatewayresponse.header.Access-Control-Allow-Headers: "'*'"
        ResponseType: DEFAULT_4XX
        RestApiId:
          Ref: 'ApiGatewayRestApi'
          
    GatewayResponseDefaultDefault5XX:
      Type: 'AWS::ApiGateway::GatewayResponse'
      Properties:
        ResponseParameters:
          gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
          gatewayresponse.header.Access-Control-Allow-Headers: "'*'"
        ResponseType: DEFAULT_5XX
        RestApiId:
          Ref: 'ApiGatewayRestApi'

    InvoicesBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:custom.invoicesBucket}
        PublicAccessBlockConfiguration:
          BlockPublicAcls: true
          BlockPublicPolicy: true
          IgnorePublicAcls: true
          RestrictPublicBuckets: true
        # Romanian fiscal law (Codul Fiscal art. 25(4)(d) + Codul de Procedură
        # Fiscală) requires 5-year invoice retention. We move to GLACIER after
        # 90 days (cheap), then expire after 5 years + 30-day grace.
        LifecycleConfiguration:
          Rules:
            - Id: InvoicesArchive
              Status: Enabled
              Transitions:
                - StorageClass: GLACIER
                  TransitionInDays: 90
              ExpirationInDays: 1855  # ~5 years + grace

    SystemStatsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.systemStatsTable}
        BillingMode: PAY_PER_REQUEST
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: true
        SSESpecification:
          SSEEnabled: true
        AttributeDefinitions:
          - AttributeName: statsId
            AttributeType: S
        KeySchema:
          - AttributeName: statsId
            KeyType: HASH

    AuditLogsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.auditLogsTable}
        BillingMode: PAY_PER_REQUEST
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: true
        SSESpecification:
          SSEEnabled: true
        AttributeDefinitions:
          - AttributeName: logId
            AttributeType: S
          - AttributeName: timestamp
            AttributeType: N
        KeySchema:
          - AttributeName: logId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: timestamp-index
            KeySchema:
              - AttributeName: timestamp
                KeyType: HASH
            Projection:
              ProjectionType: ALL

    ApiRateLimitWaf:
      Type: AWS::WAFv2::WebACL
      Properties:
        Name: eventfacematch-waf-${self:provider.stage}
        Scope: REGIONAL
        DefaultAction:
          Allow: {}
        VisibilityConfig:
          SampledRequestsEnabled: true
          CloudWatchMetricsEnabled: true
          MetricName: eventfacematch-waf-metrics
        Rules:
          - Name: RateLimitMatchFace
            Priority: 1
            Action:
              Block: {}
            Statement:
              RateBasedStatement:
                Limit: 100
                AggregateKeyType: IP
            VisibilityConfig:
              SampledRequestsEnabled: true
              CloudWatchMetricsEnabled: true
              MetricName: RateLimitMatchFaceMetric
          - Name: RateLimitLogin
            Priority: 2
            Action:
              Block: {}
            Statement:
              RateBasedStatement:
                Limit: 100
                AggregateKeyType: IP
            VisibilityConfig:
              SampledRequestsEnabled: true
              CloudWatchMetricsEnabled: true
              MetricName: RateLimitLoginMetric

    # ApiWafAssociation is applied post-deploy via scripts/associateWaf.ts
    # because CloudFormation cannot guarantee the API Gateway stage exists
    # before the association is attempted during a fresh stack creation.

    # SQS Dead Letter Queue for failed photo processing async events
    ProcessPhotoDLQ:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: eventfacematch-process-dlq-${self:provider.stage}
        MessageRetentionPeriod: 1209600 # Keep failed messages for 14 days

    # Note: the Rekognition collection is provisioned via the post-deploy
    # script `backend/scripts/ensureRekognitionCollection.ts` because
    # CloudFormation has no native `AWS::Rekognition::Collection` type and
    # a CFN custom resource adds fragility (custom resource Lambda failure
    # blocks every future stack update). The script is idempotent and runs
    # after every `serverless deploy` in CI.

    # --- Alerting infra ----------------------------------------------
    # Single topic everyone subscribes to. PagerDuty / Opsgenie pick it up
    # via email-to-ticket or HTTPS subscription, whichever the team prefers.
    AlarmTopic:
      Type: AWS::SNS::Topic
      Properties:
        TopicName: picsonar-alarms-${self:provider.stage}
        DisplayName: PicSonar Alarms (${self:provider.stage})

    # API Gateway 5xx rate — >5 errors in 5 min is "prod is on fire".
    Api5xxAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: picsonar-${self:provider.stage}-api-5xx
        AlarmDescription: "API Gateway returning 5xx responses"
        MetricName: 5XXError
        Namespace: AWS/ApiGateway
        Statistic: Sum
        Period: 300
        EvaluationPeriods: 1
        Threshold: 5
        ComparisonOperator: GreaterThanOrEqualToThreshold
        TreatMissingData: notBreaching
        Dimensions:
          - Name: ApiName
            Value: ${self:provider.stage}-${self:service}
        AlarmActions:
          - Ref: AlarmTopic
        OKActions:
          - Ref: AlarmTopic

    # API Gateway p99 latency — slow responses for paying users hurt retention.
    ApiLatencyAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: picsonar-${self:provider.stage}-api-latency-p99
        AlarmDescription: "API Gateway p99 latency over 5s sustained 10min"
        MetricName: Latency
        Namespace: AWS/ApiGateway
        ExtendedStatistic: p99
        Period: 300
        EvaluationPeriods: 2
        Threshold: 5000
        ComparisonOperator: GreaterThanThreshold
        TreatMissingData: notBreaching
        Dimensions:
          - Name: ApiName
            Value: ${self:provider.stage}-${self:service}
        AlarmActions:
          - Ref: AlarmTopic

    # DLQ depth — anything in the DLQ means photo processing is broken.
    DlqDepthAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: picsonar-${self:provider.stage}-dlq-depth
        AlarmDescription: "Photos failed to process and landed in DLQ"
        MetricName: ApproximateNumberOfMessagesVisible
        Namespace: AWS/SQS
        Statistic: Maximum
        Period: 300
        EvaluationPeriods: 1
        Threshold: 1
        ComparisonOperator: GreaterThanOrEqualToThreshold
        TreatMissingData: notBreaching
        Dimensions:
          - Name: QueueName
            Value:
              Fn::GetAtt: [ProcessPhotoDLQ, QueueName]
        AlarmActions:
          - Ref: AlarmTopic

    # DynamoDB throttles — PAY_PER_REQUEST shouldn't throttle, but when it
    # does it's always at the worst time. Alarm on any throttle, any table.
    DynamoThrottleAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: picsonar-${self:provider.stage}-dynamo-throttle
        AlarmDescription: "One or more DynamoDB tables throttled a request"
        MetricName: ThrottledRequests
        Namespace: AWS/DynamoDB
        Statistic: Sum
        Period: 300
        EvaluationPeriods: 1
        Threshold: 1
        ComparisonOperator: GreaterThanOrEqualToThreshold
        TreatMissingData: notBreaching
        AlarmActions:
          - Ref: AlarmTopic

    # Composite Lambda-errors alarm — aggregate over the whole service.
    # A handful of expected 400s don't trip this; unhandled exceptions do.
    LambdaErrorsAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: picsonar-${self:provider.stage}-lambda-errors
        AlarmDescription: "Service-wide unhandled Lambda errors"
        MetricName: Errors
        Namespace: AWS/Lambda
        Statistic: Sum
        Period: 300
        EvaluationPeriods: 1
        Threshold: 10
        ComparisonOperator: GreaterThanOrEqualToThreshold
        TreatMissingData: notBreaching
        AlarmActions:
          - Ref: AlarmTopic

    # --- Refresh-token revocation table -------------------------------
    # Rows carry a `ttl` attribute equal to the refresh token's exp so
    # DynamoDB auto-scavenges them; we never manually clean up. Keyed by
    # sha256(jti) so an exfiltrated table can't be correlated to live
    # tokens.
    RevokedTokensTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.revokedTokensTable}
        BillingMode: PAY_PER_REQUEST
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: false
        SSESpecification:
          SSEEnabled: true
        AttributeDefinitions:
          - AttributeName: pk
            AttributeType: S
        KeySchema:
          - AttributeName: pk
            KeyType: HASH
        TimeToLiveSpecification:
          AttributeName: ttl
          Enabled: true

    # --- Stripe webhook idempotency + rate limit table ----------------
    # Sliding-window rate limiter stores counts here; TTL auto-prunes.
    RateLimitsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: eventfacematch-ratelimits-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: false
        SSESpecification:
          SSEEnabled: true
        AttributeDefinitions:
          - AttributeName: pk
            AttributeType: S
        KeySchema:
          - AttributeName: pk
            KeyType: HASH
        TimeToLiveSpecification:
          AttributeName: ttl
          Enabled: true

  Outputs:
    ApiGatewayRestApiId:
      Value:
        Ref: ApiGatewayRestApi
      Export:
        Name: ${self:provider.stage}-ApiGatewayRestApiId

    ApiGatewayRestApiRootResourceId:
      Value:
        Fn::GetAtt:
          - ApiGatewayRestApi
          - RootResourceId


