name: codeql

# Static analysis for JS/TS. Catches classic XSS sinks, prototype pollution,
# path traversal, SQL-ish injection patterns, and a few of the known crypto
# anti-patterns that tests won't flag on their own.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full scan — picks up newly-disclosed CVEs in lockfile deps.
    - cron: '17 3 * * 1'

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: analyze (javascript-typescript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:javascript-typescript'
